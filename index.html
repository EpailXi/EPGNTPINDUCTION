<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EPG EHS Induction Slides</title>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f5f5f5;
      overflow: hidden;
    }

    .tabs {
      display: flex;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      height: 60px;
      align-items: center;
      padding: 0 10px;
      gap: 10px;
    }

    .tab-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #e9ecef;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: 0.2s;
    }

    .tab-btn:hover {
      background: #dbe4ff;
    }

    .tab-btn.active {
      background: #007BFF;
      color: white;
    }

    .frame-container {
      position: relative;
      width: 100vw;
      height: calc(100vh - 60px);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
      background: #fff;
    }

    iframe.active {
      display: block;
    }

    .loader-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.85);
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #ccc;
      border-top-color: #007BFF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <div class="tabs">
    <button class="tab-btn active" onclick="showFrame('ntp')">
      NTP
    </button>

    <button class="tab-btn" onclick="showFrame('kvtp')">
      KVTP
    </button>
  </div>

  <div class="frame-container">

    <div class="loader-overlay" id="loader">
      <div class="spinner"></div>
    </div>

    <!-- NTP -->
    <iframe
      id="ntp"
      class="active"
      src="https://twswzvv3ark.sg.feishu.cn/file/JLJdb43Tro5EnAxJGEPl3b6UgY2"
      title="NTP EHS Induction">
    </iframe>

    <!-- KVTP -->
    <iframe
      id="kvtp"
      src="https://twswzvv3ark.sg.feishu.cn/file/XaUBbdtdFoSakGxHCCWlYqCbg3d"
      title="KVTP EHS Induction">
    </iframe>

  </div>

  <script>
    const loader = document.getElementById('loader');
    const iframes = document.querySelectorAll('iframe');
    const buttons = document.querySelectorAll('.tab-btn');

    // Hide loader after first frame loads
    document.getElementById('ntp').addEventListener('load', () => {
      loader.style.display = 'none';
    });

    function showFrame(frameId) {

      loader.style.display = 'flex';

      // Hide all frames
      iframes.forEach(frame => {
        frame.classList.remove('active');
      });

      // Remove active button
      buttons.forEach(btn => {
        btn.classList.remove('active');
      });

      // Show selected frame
      const selectedFrame = document.getElementById(frameId);
      selectedFrame.classList.add('active');

      // Active button
      event.target.classList.add('active');

      // Hide loader when loaded
      selectedFrame.onload = () => {
        loader.style.display = 'none';
      };
    }
  </script>

</body>
</html>
